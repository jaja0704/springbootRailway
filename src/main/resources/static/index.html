<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基隆景點</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <h2 class="text-center mb-4 text-primary">基隆景點</h2>
    
    <div id="DistrictButtons" class="d-flex flex-wrap justify-content-center gap-2 mb-5">
      </div>

    <div id="AttractionsContainer" class="row g-4">
      <div class="col-12 text-center text-secondary">請點選上方的行政區以載入景點資料。</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    const districts = ['中山區', '信義區', '仁愛區', '中正區', '安樂區', '七堵區', '暖暖區'];
    const btnContainer = document.getElementById('DistrictButtons');
    const dataContainer = document.getElementById('AttractionsContainer');

    // 初始化按鈕
    districts.forEach(district => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-primary';
      btn.textContent = district;
      btn.onclick = () => fetchAttractions(district);
      btnContainer.appendChild(btn);
    });

    // 呼叫 Web API
    async function fetchAttractions(district) {
      dataContainer.innerHTML = '<div class="col-12 text-center spinner-border text-primary" role="status"></div>';
      
    
      const API_URL = `/sights?zone=${district}`; 

      try {
        const response = await fetch(API_URL);
        const SightData = await response.json();
        
        // 測試用資料
        // const data = [
        //   { id: 1, SightName: '測試景點 A', Zone: district, Category: '風景區', Address: '基隆市中正區北寧路367號', PhotoURL: 'https://via.placeholder.com/400x200', Description: '這是一個美麗的海景公園。' },
        //   { id: 2, SightName: '測試景點 B', Zone: district, Category: '歷史古蹟', Address: '基隆市中正區建國街', PhotoURL: 'https://via.placeholder.com/400x200', Description: '具有百年歷史的軍事要塞。' }
        // ];

        renderCards(SightData);
      } catch (error) {
        console.error('API 呼叫失敗:', error);
        dataContainer.innerHTML = '<div class="col-12 text-center text-danger">資料載入失敗，請檢查 API 連線。</div>';
      }
    }

    function renderCards(attract) {
      dataContainer.innerHTML = '';
      
      if (!attract || attract.length === 0) {
        dataContainer.innerHTML = '<div class="col-12 text-center">該區目前無景點資料。</div>';
        return;
      }

      attract.forEach((item, index) => {
        // 處理 Google Map 網址
        const mapLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.address)}`;
        const collapseId = `collapseInfo-${index}`;

        const cardHTML = `
          <div class="col-12 col-md-4">
            <div class="card h-100 shadow-sm border-0">
              <div class="card-body">
                <h5 class="card-title fw-bold">${item.sightName}</h5>
                <h6 class="card-subtitle mb-3 text-muted">${item.zone} | ${item.category}</h6>
                
                <div class="d-flex gap-2 mb-3">
                  <a href="${mapLink}" target="_blank" class="btn btn-success btn-sm w-50">地址 (Google 地圖)</a>
                  <button class="btn btn-secondary btn-sm w-50" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false">
                    詳細資訊
                  </button>
                </div>

                <div class="collapse" id="${collapseId}">
                  <div class="card card-body p-0 border-0 mt-2">
                    <img src="${item.photoURL}" class="img-fluid rounded mb-2" alt="${item.sightName}">
                    <p class="card-text text-secondary" style="font-size: 0.9rem;">${item.description}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
        dataContainer.insertAdjacentHTML('beforeend', cardHTML);
      });
    }
  </script>
</body>
</html>
